name: Sync Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history, NO submodule)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ===== 只改这两行就行 =====
      - name: Fetch upstream (safe URL, no double-write)
        env:
          UP_OWNER: alireza0
          UP_REPO: s-ui
          UP_BRANCH: main
          TGT_BRANCH: main
        run: |
          UP_URL="https://github.com/${UP_OWNER}/${UP_REPO}.git"

          echo "Upstream: $UP_URL"

          git remote -v
          git remote add upstream "$UP_URL" 2>/dev/null || git remote set-url upstream "$UP_URL"

          # 先试无认证 fetch（公开仓库只读一定过；不过你也可以用 gh CLI 带 token）
          if ! git fetch upstream --tags --force; then
            echo "::error::Upstream fetch failed. Is alireza0/s-ui still accessible?"
            exit 1
          fi

          git checkout "$TGT_BRANCH"

          LOCAL=$(git rev-parse "$TGT_BRANCH")
          REMOTE=$(git rev-parse upstream/"$UP_BRANCH")

          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "✅ In sync — nothing to push (local=$LOCAL)"
            exit 0
          fi

          echo "🔄 Syncing: $LOCAL → $REMOTE"

          # 优先快进
          if git merge-base --is-ancestor "$LOCAL" "$REMOTE"; then
            git reset --hard "upstream/$UP_BRANCH"
          elif git merge-base "$LOCAL" "$REMOTE" >/dev/null 2>&1; then
            # 有共同祖先：普通 merge
            git merge "upstream/$UP_BRANCH" --no-edit
          else
            # 历史完全不相关：允许合并不相关历史
            git merge "upstream/$UP_BRANCH" --no-edit --allow-unrelated-histories
          fi

          git push origin "$TGT_BRANCH" --follow-tags

          echo "✅ Pushed updated main to your fork"
